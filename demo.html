<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال بارگذاری دموی زنده صرافی الشیخ...</title>
    <style>
        body {
            background-color: #0D0C22;
            color: #E2E8F0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            animation: fadeIn 1.5s ease-in-out;
        }
        h1 {
            font-size: 2rem;
            color: #67E8F9; /* cyan-300 */
        }
        p {
            font-size: 1.2rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>دموی زنده صرافی الشیخ</h1>
        <p>در حال بارگذاری تجربه هوشمند مدیریت صرافی... لطفاً منتظر بمانید.</p>
    </div>

    <script>
        // This script redirects to the demo page within the main application.
        // It uses a relative path to ensure it works correctly whether opened
        // locally or on a server. The hash routing (`/#/`) is targeted.
        window.onload = function() {
            // Get the current path and replace this filename with the main index.html path + demo route
            const currentPath = window.location.pathname;
            const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
            const demoUrl = basePath + 'index.html#/demo';
            
            // Redirect to the demo page
            window.location.href = demoUrl;
        };
    </script>
</body>
</html>
